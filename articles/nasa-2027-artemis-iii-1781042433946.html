<h1>NASAが2027年のArtemis IIIミッションに向けて前進し、乗組員を発表</h1>
<p>NASAは火曜日にArtemis IIIミッションの詳細を発表し、主要な4名の乗組員と予備の1名を公表しました。2027年に予定されているこのミッションは、近年で最も複雑な有人宇宙飛行の一つとされており、月探索の新たな一歩となります。</p>
